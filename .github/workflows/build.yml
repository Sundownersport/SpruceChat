name: Build

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout SpruceChat
        uses: actions/checkout@v4

      - name: Clone llama.cpp
        run: git clone --depth 1 https://github.com/ggerganov/llama.cpp.git /tmp/llama.cpp

      - name: Install ARM cross-compiler and ccache
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake make gcc-arm-linux-gnueabihf g++-arm-linux-gnueabihf ccache

      - name: Restore ccache
        uses: actions/cache@v4
        with:
          path: ~/.ccache
          key: ccache-arm-${{ hashFiles('/tmp/llama.cpp/.git/HEAD') }}
          restore-keys: ccache-arm-

      - name: Cross-compile for ARMv7 NEON
        working-directory: /tmp/llama.cpp
        run: |
          cat > arm32-toolchain.cmake <<'EOF'
          set(CMAKE_SYSTEM_NAME Linux)
          set(CMAKE_SYSTEM_PROCESSOR arm)
          set(CMAKE_C_COMPILER_LAUNCHER ccache)
          set(CMAKE_CXX_COMPILER_LAUNCHER ccache)
          set(CMAKE_C_COMPILER arm-linux-gnueabihf-gcc)
          set(CMAKE_CXX_COMPILER arm-linux-gnueabihf-g++)
          set(CMAKE_FIND_ROOT_PATH_MODE_PROGRAM NEVER)
          set(CMAKE_FIND_ROOT_PATH_MODE_LIBRARY ONLY)
          set(CMAKE_FIND_ROOT_PATH_MODE_INCLUDE ONLY)
          set(CMAKE_C_FLAGS "-march=armv7-a -mfpu=neon-vfpv4 -mfloat-abi=hard -O2")
          set(CMAKE_CXX_FLAGS "-march=armv7-a -mfpu=neon-vfpv4 -mfloat-abi=hard -O2")
          EOF

          ccache -z
          cmake -B build \
            -DCMAKE_TOOLCHAIN_FILE=arm32-toolchain.cmake \
            -DCMAKE_BUILD_TYPE=Release \
            -DGGML_NATIVE=OFF \
            -DLLAMA_CURL=OFF \
            -DGGML_OPENMP=OFF

          cmake --build build --target llama-server llama-cli -j$(nproc)
          ccache -s

      - name: Collect binaries and libraries
        run: |
          # Binaries
          cp /tmp/llama.cpp/build/bin/llama-server llama-server
          cp /tmp/llama.cpp/build/bin/llama-cli llama-cli
          chmod +x llama-server llama-cli

          # llama.cpp shared libs
          mkdir -p lib
          for soname in libggml-base.so.0 libggml-cpu.so.0 libggml.so.0 libllama.so.0 libmtmd.so.0; do
            real=$(find /tmp/llama.cpp/build/bin -name "${soname}*" ! -type l | head -1)
            if [ -n "$real" ]; then
              cp "$real" "lib/$soname"
            fi
          done

          # ARM glibc from cross-compiler sysroot
          SYSROOT=/usr/arm-linux-gnueabihf/lib
          for lib in ld-linux-armhf.so.3 libc.so.6 libm.so.6 libpthread.so.0 libdl.so.2 librt.so.1 libgcc_s.so.1; do
            cp "$SYSROOT/$lib" "lib/$lib" 2>/dev/null || true
          done
          # libstdc++ may be a symlink
          real=$(readlink -f "$SYSROOT/libstdc++.so.6")
          cp "$real" lib/libstdc++.so.6

          chmod +x lib/ld-linux-armhf.so.3

      - name: Download model from models release
        run: gh release download models -p "qwen2.5-0.5b-instruct-q4_0.gguf" -D models
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Package release zip
        run: |
          mkdir -p SpruceChat/models SpruceChat/lib
          cp llama-server llama-cli SpruceChat/
          cp -r lib/* SpruceChat/lib/
          cp models/*.gguf SpruceChat/models/
          cp chat.py config.json icon.png launch.sh README.md SpruceChat/
          zip -r SpruceChat.zip SpruceChat/

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: SpruceChat
          path: SpruceChat.zip

  release:
    needs: build
    runs-on: ubuntu-24.04
    permissions:
      contents: write

    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: SpruceChat

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: build-${{ github.run_number }}
          name: Build #${{ github.run_number }}
          files: SpruceChat.zip
          generate_release_notes: true
